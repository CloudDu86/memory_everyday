<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏三昧：平静的心在体验每一天</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 使用 lucide 核心库替代 lucide-react 以获得更好的 CDN 稳定性 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-neutral-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /**
         * 自定义图标组件
         * 由于 LucideReact CDN 变量不稳定，我们直接从 lucide.icons 中提取 SVG 结构进行渲染
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            // 获取图标数据：忽略大小写匹配对象属性
            const iconKey = Object.keys(lucide?.icons || {}).find(k => k.toLowerCase() === name.toLowerCase());
            const iconData = iconKey ? lucide.icons[iconKey] : null;

            if (!iconData) return null;

            return React.createElement(
                'svg',
                {
                    xmlns: "http://www.w3.org/2000/svg",
                    width: size,
                    height: size,
                    viewBox: "0 0 24 24",
                    className: `lucide lucide-${name.toLowerCase()} ${className}`,
                    stroke: "currentColor",
                    strokeWidth: 2,
                    fill: "none",
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                    dangerouslySetInnerHTML: {
                        __html: iconData.map(child => {
                            const [childTag, childAttrs] = child;
                            const attrStr = Object.entries(childAttrs)
                                .map(([k, v]) => `${k}="${v}"`)
                                .join(' ');
                            return `<${childTag} ${attrStr}></${childTag}>`;
                        }).join('')
                    }
                }
            );
        };

        const CATEGORIES = [
            { id: 'heart', name: '心 (Heart)', iconName: 'Heart', sub: '法、关系、娱乐', color: 'bg-red-50', borderColor: 'border-red-100', iconColor: 'text-red-500' },
            { id: 'body', name: '体 (Body)', iconName: 'Activity', sub: '体能、柔性', color: 'bg-emerald-50', borderColor: 'border-emerald-100', iconColor: 'text-emerald-500' },
            { id: 'skill', name: '技 (Skill)', iconName: 'Trophy', sub: '项目创作、苦与乐', color: 'bg-blue-50', borderColor: 'border-blue-100', iconColor: 'text-blue-500' }
        ];

        function App() {
            const [logs, setLogs] = useState([]);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [view, setView] = useState('input');
            const [scores, setScores] = useState({
                heart: { plus: 0, minus: 0, note: '' },
                body: { plus: 0, minus: 0, note: '' },
                skill: { plus: 0, minus: 0, note: '' }
            });
            const [showSettings, setShowSettings] = useState(false);
            const [githubConfig, setGithubConfig] = useState({ token: '', owner: 'CloudDu86', repo: 'memory_everyday', fileSha: null });
            const [syncStatus, setSyncStatus] = useState(''); // '', 'syncing', 'success', 'error'
            const [habits, setHabits] = useState([
                { id: 1, name: '11点15分准备睡', doneDates: [] },
                { id: 2, name: '每日阅读', doneDates: [] },
                { id: 3, name: '每日冥想', doneDates: [] }
            ]);
            const [habitsSha, setHabitsSha] = useState(null);
            const [editingHabitId, setEditingHabitId] = useState(null);
            const [showHabitsModal, setShowHabitsModal] = useState(false);
            const [checklists, setChecklists] = useState({}); // { date: { morning: [], afternoon: [], evening: [] } }
            const [checklistsSha, setChecklistsSha] = useState(null);
            const [showLunchModal, setShowLunchModal] = useState(false);
            const [lunchItems, setLunchItems] = useState([]);
            const [lunchLoading, setLunchLoading] = useState(false);
            const [spinResult, setSpinResult] = useState(null);
            const [isSpinning, setIsSpinning] = useState(false);
            const wheelCanvasRef = React.useRef(null);
            const currentAngleRef = React.useRef(0);

            // 初始化加载本地数据，并尝试从 GitHub 同步
            useEffect(() => {
                const localConfig = localStorage.getItem('github_config');
                let config = { token: '', owner: 'CloudDu86', repo: 'memory_everyday', fileSha: null };
                if (localConfig) {
                    try { config = { ...config, ...JSON.parse(localConfig) }; } catch (e) { }
                    setGithubConfig(config);
                }

                const saved = localStorage.getItem('daily_logs');
                if (saved) {
                    try {
                        setLogs(JSON.parse(saved));
                    } catch (e) {
                        console.error("Failed to parse logs", e);
                    }
                }

                const savedHabits = localStorage.getItem('habits_data');
                if (savedHabits) {
                    try { 
                        const parsed = JSON.parse(savedHabits);
                        // 确保至少有 3 个槽位
                        const completeHabits = [...parsed];
                        while(completeHabits.length < 3) {
                            completeHabits.push({ id: Date.now() + completeHabits.length, name: `新习惯 ${completeHabits.length + 1}`, doneDates: [] });
                        }
                        setHabits(completeHabits.slice(0, 3)); 
                    } catch(e) {}
                }

                if (config.token && config.owner && config.repo) {
                    fetchFromGitHub(config);
                    fetchHabitsFromGitHub(config);
                    fetchChecklistsFromGitHub(config);
                }
            }, []);

            const fetchChecklistsFromGitHub = async (config = githubConfig) => {
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/checklists.json`, {
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const decodedContent = decodeURIComponent(escape(atob(data.content)));
                        const fetchedChecklists = JSON.parse(decodedContent);
                        setChecklists(fetchedChecklists);
                        setChecklistsSha(data.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 404) {
                        setChecklistsSha(null);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    }
                } catch (err) {
                    console.error("Checklists Sync Error:", err);
                }
            };

            // 当日期或日志改变时，自动回填当天已保存的数据
            useEffect(() => {
                const existingLog = logs.find(l => l.date === date);
                if (existingLog) {
                    setScores({
                        heart: { plus: existingLog.scores.heart.plus || 0, minus: existingLog.scores.heart.minus || 0, note: existingLog.scores.heart.note || '' },
                        body: { plus: existingLog.scores.body.plus || 0, minus: existingLog.scores.body.minus || 0, note: existingLog.scores.body.note || '' },
                        skill: { plus: existingLog.scores.skill.plus || 0, minus: existingLog.scores.skill.minus || 0, note: existingLog.scores.skill.note || '' }
                    });
                } else {
                    setScores({
                        heart: { plus: 0, minus: 0, note: '' },
                        body: { plus: 0, minus: 0, note: '' },
                        skill: { plus: 0, minus: 0, note: '' }
                    });
                }
            }, [date, logs]);

            useEffect(() => {
                if (showLunchModal && lunchItems.length > 0) {
                    setTimeout(() => drawWheel(currentAngleRef.current, lunchItems), 50);
                }
            }, [showLunchModal, lunchItems]); // eslint-disable-line

            const fetchHabitsFromGitHub = async (config = githubConfig) => {
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/habits.json`, {
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const decodedContent = decodeURIComponent(escape(atob(data.content)));
                        const fetchedHabits = JSON.parse(decodedContent);
                        // 确保至少有 3 个
                        const completeHabits = [...fetchedHabits];
                        while(completeHabits.length < 3) {
                            completeHabits.push({ id: Date.now() + completeHabits.length, name: `新习惯 ${completeHabits.length + 1}`, doneDates: [] });
                        }
                        const finalHabits = completeHabits.slice(0, 3);
                        setHabits(finalHabits);
                        localStorage.setItem('habits_data', JSON.stringify(finalHabits));
                        setHabitsSha(data.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 404) {
                        setHabitsSha(null);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        throw new Error('Habits API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("Habits Sync Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const fetchFromGitHub = async (config = githubConfig) => {
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data.json`, {
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const decodedContent = decodeURIComponent(escape(atob(data.content)));
                        const fetchedLogs = JSON.parse(decodedContent);
                        setLogs(fetchedLogs);
                        localStorage.setItem('daily_logs', JSON.stringify(fetchedLogs));
                        setGithubConfig(prev => ({ ...prev, fileSha: data.sha }));
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 404) {
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        throw new Error('API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("GitHub Sync Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const saveToGitHub = async (newLogs, config = githubConfig) => {
                if (!config.token || !config.owner || !config.repo) return;
                setSyncStatus('syncing');
                try {
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newLogs, null, 2))));
                    const body = { message: "Sync daily logs", content: content };
                    if (config.fileSha) body.sha = config.fileSha;

                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setGithubConfig(prev => ({ ...prev, fileSha: data.content.sha }));
                        localStorage.setItem('github_config', JSON.stringify({ ...config, fileSha: data.content.sha }));
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        throw new Error('API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("GitHub Save Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const saveHabitsToGitHub = async (newHabits, config = githubConfig, retry = true) => {
                if (!config.token || !config.owner || !config.repo) return;
                setSyncStatus('syncing');
                try {
                    // 如果 SHA 缺失，先尝试获取一次最新的 SHA
                    let currentSha = habitsSha;
                    if (!currentSha) {
                        const checkRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/habits.json`, {
                            headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                        });
                        if (checkRes.ok) {
                            const checkData = await checkRes.json();
                            currentSha = checkData.sha;
                        }
                    }

                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newHabits, null, 2))));
                    const body = { message: "Sync habits", content: content };
                    if (currentSha) body.sha = currentSha;

                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/habits.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setHabitsSha(data.content.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 409 && retry) {
                        // 发生冲突，重试一次
                        console.warn("Habits sync conflict, retrying...");
                        setHabitsSha(null); // 清除 SHA 触发重新获取
                        return saveHabitsToGitHub(newHabits, config, false);
                    } else {
                        throw new Error('Habits Save API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("Habits Save Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const saveChecklistsToGitHub = async (newChecklists, config = githubConfig, retry = true) => {
                if (!config.token || !config.owner || !config.repo) return;
                setSyncStatus('syncing');
                try {
                    let currentSha = checklistsSha;
                    if (!currentSha) {
                        const checkRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/checklists.json`, {
                            headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                        });
                        if (checkRes.ok) {
                            const checkData = await checkRes.json();
                            currentSha = checkData.sha;
                        }
                    }

                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newChecklists, null, 2))));
                    const body = { message: "Sync checklists", content: content };
                    if (currentSha) body.sha = currentSha;

                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/checklists.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setChecklistsSha(data.content.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 409 && retry) {
                        console.warn("Checklists sync conflict, retrying...");
                        setChecklistsSha(null);
                        return saveChecklistsToGitHub(newChecklists, config, false);
                    }
                } catch (err) {
                    console.error("Checklists Save Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const updateChecklist = (section, index, field, value) => {
                const currentDayList = checklists[date] || {
                    morning: [{t:'', d:false},{t:'', d:false},{t:'', d:false}],
                    afternoon: [{t:'', d:false},{t:'', d:false},{t:'', d:false}],
                    evening: [{t:'', d:false},{t:'', d:false},{t:'', d:false}]
                };
                
                const sectionList = [...currentDayList[section]];
                sectionList[index] = { ...sectionList[index], [field]: value };
                
                const newChecklists = {
                    ...checklists,
                    [date]: { ...currentDayList, [section]: sectionList }
                };
                setChecklists(newChecklists);
            };

            const commitChecklist = () => {
                saveChecklistsToGitHub(checklists);
            };
            const toggleHabit = (id) => {
                const newHabits = habits.map(h => {
                    if (h.id === id) {
                        const doneDates = h.doneDates.includes(date) 
                            ? h.doneDates.filter(d => d !== date)
                            : [...h.doneDates, date];
                        return { ...h, doneDates };
                    }
                    return h;
                });
                setHabits(newHabits);
                localStorage.setItem('habits_data', JSON.stringify(newHabits));
                saveHabitsToGitHub(newHabits);
            };

            const updateHabitName = (id, newName) => {
                const newHabits = habits.map(h => h.id === id ? { ...h, name: newName } : h);
                setHabits(newHabits);
                localStorage.setItem('habits_data', JSON.stringify(newHabits));
            };

            const commitHabitName = () => {
                saveHabitsToGitHub(habits);
                setEditingHabitId(null);
            };

            const calculateCatScore = (catId) => 6 + scores[catId].plus - scores[catId].minus;

            const updateScore = (catId, type, delta) => {
                setScores(prev => ({
                    ...prev,
                    [catId]: { ...prev[catId], [type]: Math.max(0, prev[catId][type] + delta) }
                }));
            };
            const handleSave = () => {
                const finalData = {
                    id: Date.now(),
                    date,
                    scores: {
                        heart: { score: calculateCatScore('heart'), ...scores.heart },
                        body: { score: calculateCatScore('body'), ...scores.body },
                        skill: { score: calculateCatScore('skill'), ...scores.skill }
                    },
                    total: calculateCatScore('heart') + calculateCatScore('body') + calculateCatScore('skill')
                };
                
                // 检查是否已存在该日期的记录，存在则更新，不存在则添加
                const existingIndex = logs.findIndex(l => l.date === date);
                let newLogs;
                if (existingIndex >= 0) {
                    newLogs = [...logs];
                    newLogs[existingIndex] = { ...finalData, id: logs[existingIndex].id }; // 保持原 ID
                } else {
                    newLogs = [finalData, ...logs];
                }

                setLogs(newLogs);
                localStorage.setItem('daily_logs', JSON.stringify(newLogs));
                saveToGitHub(newLogs);
                alert('今日记录已同步至云端！');
            };

            const deleteLog = (id) => {
                if (!confirm('确定要删除这条记录吗？')) return;
                const newLogs = logs.filter(l => l.id !== id);
                setLogs(newLogs);
                localStorage.setItem('daily_logs', JSON.stringify(newLogs));
                saveToGitHub(newLogs);
            };

            const exportToCSV = () => {
                if (logs.length === 0) return;
                const headers = ["日期", "总分", "心分数", "心备注", "体分数", "体备注", "技分数", "技备注"];
                const rows = logs.map(log => [
                    log.date,
                    log.total,
                    log.scores.heart.score,
                    `"${(log.scores.heart.note || '').replace(/"/g, '""')}"`,
                    log.scores.body.score,
                    `"${(log.scores.body.note || '').replace(/"/g, '""')}"`,
                    log.scores.skill.score,
                    `"${(log.scores.skill.note || '').replace(/"/g, '""')}"`
                ]);
                const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `游戏三昧分析_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            const fetchLunchItems = async () => {
                setLunchLoading(true);
                try {
                    const sheetId = '1U7Itf4-XiiQ_gyyAsNRmNmmnQSnUVHbJOWQbv5y5RhM';
                    // 使用 export?format=csv 可能更稳定，但 gviz/tq 也不错
                    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    const text = await res.text();
                    
                    // 更健壮的 CSV 行解析：处理 \r\n，提取第一列，去除引号
                    const items = text.split(/\r?\n/)
                        .map(line => {
                            // 匹配第一个单元格的内容（处理被引号包裹的情况）
                            const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                            const firstCell = cells[0] || '';
                            return firstCell.replace(/^"|"$/g, '').trim();
                        })
                        .filter(l => l.length > 0 && 
                                     !['Column1', '菜单', 'Lunch', '名称', '项目', 'Name', 'Item'].includes(l));
                    
                    if (items.length > 0) {
                        setLunchItems(items);
                    } else {
                        // 如果解析后为空，则使用兜底菜单
                        setLunchItems(['便当', '拉面', '炒饭', '沙拉', '三明治', '寿司', '汉堡', '饺子']);
                    }
                } catch (e) {
                    console.error('午餐菜单加载失败:', e);
                    // 只有在 lunchItems 为空时才设置兜底，避免覆盖已有的成功加载
                    setLunchItems(prev => prev.length > 0 ? prev : ['便当', '拉面', '炒饭', '沙拉', '三明治', '寿司', '汉堡', '饺子']);
                }
                setLunchLoading(false);
            };

            const drawWheel = (angle, items) => {
                const canvas = wheelCanvasRef.current;
                if (!canvas || !items || items.length === 0) return;
                const ctx = canvas.getContext('2d');
                const size = 320;
                const cx = size / 2, cy = size / 2;
                const r = cx - 12;
                const n = items.length;
                const arc = (2 * Math.PI) / n;
                const colors = ['#fca5a5','#fdba74','#fcd34d','#86efac','#67e8f9','#a5b4fc','#f0abfc','#fda4af','#6ee7b7','#93c5fd'];
                ctx.clearRect(0, 0, size, size);
                for (let i = 0; i < n; i++) {
                    const start = angle + i * arc;
                    const end = start + arc;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, r, start, end);
                    ctx.closePath();
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fill();
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.save();
                    ctx.translate(cx, cy);
                    ctx.rotate(start + arc / 2);
                    ctx.textAlign = 'right';
                    ctx.fillStyle = '#0f172a';
                    ctx.font = 'bold 11px Inter, sans-serif';
                    const displayText = items[i].length > 8 ? items[i].slice(0,8)+'…' : items[i];
                    ctx.fillText(displayText, r - 6, 4);
                    ctx.restore();
                }
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                ctx.strokeStyle = '#cbd5e1';
                ctx.lineWidth = 2;
                ctx.stroke();
            };

            const spinWheel = () => {
                if (isSpinning || lunchItems.length === 0) return;
                setIsSpinning(true);
                setSpinResult(null);
                const items = lunchItems;
                const n = items.length;
                const arc = (2 * Math.PI) / n;
                const targetIndex = Math.floor(Math.random() * n);
                const finalAngle = -(targetIndex + 0.5) * arc;
                const startAngle = currentAngleRef.current;
                const diff = ((finalAngle - startAngle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
                const totalRotation = (6 + Math.floor(Math.random() * 4)) * 2 * Math.PI + diff;
                const duration = 4000 + Math.random() * 1500;
                const startTime = performance.now();
                const animate = (now) => {
                    const elapsed = now - startTime;
                    const t = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - t, 4);
                    currentAngleRef.current = startAngle + totalRotation * eased;
                    drawWheel(currentAngleRef.current, items);
                    if (t < 1) {

                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b">
                                                <tr>
                                                    <th className="p-6">日期</th>
                                                    <th className="p-6">总得分</th>
                                                    <th className="p-6">维度明细 (心 / 体 / 技)</th>
                                                    <th className="p-6">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {logs.map(log => (
                                                    <tr key={log.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-6 font-bold text-slate-700">{log.date}</td>
                                                        <td className="p-6">
                                                            <span className="bg-slate-900 text-white px-3 py-1 rounded-lg text-xs font-black">
                                                                {log.total}
                                                            </span>
                                                        </td>
                                                        <td className="p-6">
                                                            <div className="flex gap-4 text-xs font-bold">
                                                                <span className="text-red-500">心: {log.scores.heart.score}</span>
                                                                <span className="text-emerald-500">体: {log.scores.body.score}</span>
                                                                <span className="text-blue-500">技: {log.scores.skill.score}</span>
                                                            </div>
                                                        </td>
                                                        <td className="p-6 text-right">
                                                            <button
                                                                onClick={() => deleteLog(log.id)}
                                                                className="text-slate-300 hover:text-red-500 transition-colors p-2"
                                                            >
                                                                <Icon name="Trash2" size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {logs.length === 0 && (
                                        <div className="py-20 text-center text-slate-400 italic">
                                            暂无记录。今天就开始你的修行吧。
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
