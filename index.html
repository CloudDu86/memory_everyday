<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏三昧：平静的心在体验每一天</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 使用 lucide 核心库替代 lucide-react 以获得更好的 CDN 稳定性 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="bg-neutral-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /**
         * 自定义图标组件
         * 由于 LucideReact CDN 变量不稳定，我们直接从 lucide.icons 中提取 SVG 结构进行渲染
         */
        const Icon = ({ name, size = 24, className = "" }) => {
            // 获取图标数据：忽略大小写匹配对象属性
            const iconKey = Object.keys(lucide?.icons || {}).find(k => k.toLowerCase() === name.toLowerCase());
            const iconData = iconKey ? lucide.icons[iconKey] : null;

            if (!iconData) return null;

            return React.createElement(
                'svg',
                {
                    xmlns: "http://www.w3.org/2000/svg",
                    width: size,
                    height: size,
                    viewBox: "0 0 24 24",
                    className: `lucide lucide-${name.toLowerCase()} ${className}`,
                    stroke: "currentColor",
                    strokeWidth: 2,
                    fill: "none",
                    strokeLinecap: "round",
                    strokeLinejoin: "round",
                    dangerouslySetInnerHTML: {
                        __html: iconData.map(child => {
                            const [childTag, childAttrs] = child;
                            const attrStr = Object.entries(childAttrs)
                                .map(([k, v]) => `${k}="${v}"`)
                                .join(' ');
                            return `<${childTag} ${attrStr}></${childTag}>`;
                        }).join('')
                    }
                }
            );
        };

        const CATEGORIES = [
            { id: 'heart', name: '心 (Heart)', iconName: 'Heart', sub: '法、关系、娱乐', color: 'bg-red-50', borderColor: 'border-red-100', iconColor: 'text-red-500' },
            { id: 'body', name: '体 (Body)', iconName: 'Activity', sub: '体能、柔性', color: 'bg-emerald-50', borderColor: 'border-emerald-100', iconColor: 'text-emerald-500' },
            { id: 'skill', name: '技 (Skill)', iconName: 'Trophy', sub: '项目创作、苦与乐', color: 'bg-blue-50', borderColor: 'border-blue-100', iconColor: 'text-blue-500' }
        ];

        function App() {
            const [logs, setLogs] = useState([]);
            const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
            const [view, setView] = useState('input');
            const [scores, setScores] = useState({
                heart: { plus: 0, minus: 0, note: '' },
                body: { plus: 0, minus: 0, note: '' },
                skill: { plus: 0, minus: 0, note: '' }
            });
            const [showSettings, setShowSettings] = useState(false);
            const [githubConfig, setGithubConfig] = useState({ token: '', owner: 'CloudDu86', repo: 'memory_everyday', fileSha: null });
            const [syncStatus, setSyncStatus] = useState(''); // '', 'syncing', 'success', 'error'
            const [habits, setHabits] = useState([{ id: 1, name: '每日阅读', doneDates: [] }]);
            const [habitsSha, setHabitsSha] = useState(null);
            const [editingHabitId, setEditingHabitId] = useState(null);
            const [checklists, setChecklists] = useState({}); // { date: { morning: [], afternoon: [], evening: [] } }
            const [checklistsSha, setChecklistsSha] = useState(null);

            // 初始化加载本地数据，并尝试从 GitHub 同步
            useEffect(() => {
                const localConfig = localStorage.getItem('github_config');
                let config = { token: '', owner: 'CloudDu86', repo: 'memory_everyday', fileSha: null };
                if (localConfig) {
                    try { config = { ...config, ...JSON.parse(localConfig) }; } catch (e) { }
                    setGithubConfig(config);
                }

                const saved = localStorage.getItem('daily_logs');
                if (saved) {
                    try {
                        setLogs(JSON.parse(saved));
                    } catch (e) {
                        console.error("Failed to parse logs", e);
                    }
                }

                const savedHabits = localStorage.getItem('habits_data');
                if (savedHabits) {
                    try { setHabits(JSON.parse(savedHabits)); } catch(e) {}
                }

                if (config.token && config.owner && config.repo) {
                    fetchFromGitHub(config);
                    fetchHabitsFromGitHub(config);
                    fetchChecklistsFromGitHub(config);
                }
            }, []);

            const fetchChecklistsFromGitHub = async (config = githubConfig) => {
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/checklists.json`, {
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const decodedContent = decodeURIComponent(escape(atob(data.content)));
                        const fetchedChecklists = JSON.parse(decodedContent);
                        setChecklists(fetchedChecklists);
                        setChecklistsSha(data.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 404) {
                        setChecklistsSha(null);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    }
                } catch (err) {
                    console.error("Checklists Sync Error:", err);
                }
            };

            // 当日期或日志改变时，自动回填当天已保存的数据
            useEffect(() => {
                const existingLog = logs.find(l => l.date === date);
                if (existingLog) {
                    setScores({
                        heart: { plus: existingLog.scores.heart.plus || 0, minus: existingLog.scores.heart.minus || 0, note: existingLog.scores.heart.note || '' },
                        body: { plus: existingLog.scores.body.plus || 0, minus: existingLog.scores.body.minus || 0, note: existingLog.scores.body.note || '' },
                        skill: { plus: existingLog.scores.skill.plus || 0, minus: existingLog.scores.skill.minus || 0, note: existingLog.scores.skill.note || '' }
                    });
                } else {
                    setScores({
                        heart: { plus: 0, minus: 0, note: '' },
                        body: { plus: 0, minus: 0, note: '' },
                        skill: { plus: 0, minus: 0, note: '' }
                    });
                }
            }, [date, logs]);

            const fetchHabitsFromGitHub = async (config = githubConfig) => {
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/habits.json`, {
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const decodedContent = decodeURIComponent(escape(atob(data.content)));
                        const fetchedHabits = JSON.parse(decodedContent);
                        setHabits(fetchedHabits);
                        localStorage.setItem('habits_data', JSON.stringify(fetchedHabits));
                        setHabitsSha(data.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 404) {
                        setHabitsSha(null);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        throw new Error('Habits API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("Habits Sync Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const fetchFromGitHub = async (config = githubConfig) => {
                setSyncStatus('syncing');
                try {
                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data.json`, {
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (res.ok) {
                        const data = await res.json();
                        const decodedContent = decodeURIComponent(escape(atob(data.content)));
                        const fetchedLogs = JSON.parse(decodedContent);
                        setLogs(fetchedLogs);
                        localStorage.setItem('daily_logs', JSON.stringify(fetchedLogs));
                        setGithubConfig(prev => ({ ...prev, fileSha: data.sha }));
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 404) {
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        throw new Error('API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("GitHub Sync Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const saveToGitHub = async (newLogs, config = githubConfig) => {
                if (!config.token || !config.owner || !config.repo) return;
                setSyncStatus('syncing');
                try {
                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newLogs, null, 2))));
                    const body = { message: "Sync daily logs", content: content };
                    if (config.fileSha) body.sha = config.fileSha;

                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/data.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setGithubConfig(prev => ({ ...prev, fileSha: data.content.sha }));
                        localStorage.setItem('github_config', JSON.stringify({ ...config, fileSha: data.content.sha }));
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else {
                        throw new Error('API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("GitHub Save Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const saveHabitsToGitHub = async (newHabits, config = githubConfig, retry = true) => {
                if (!config.token || !config.owner || !config.repo) return;
                setSyncStatus('syncing');
                try {
                    // 如果 SHA 缺失，先尝试获取一次最新的 SHA
                    let currentSha = habitsSha;
                    if (!currentSha) {
                        const checkRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/habits.json`, {
                            headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                        });
                        if (checkRes.ok) {
                            const checkData = await checkRes.json();
                            currentSha = checkData.sha;
                        }
                    }

                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newHabits, null, 2))));
                    const body = { message: "Sync habits", content: content };
                    if (currentSha) body.sha = currentSha;

                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/habits.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setHabitsSha(data.content.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 409 && retry) {
                        // 发生冲突，重试一次
                        console.warn("Habits sync conflict, retrying...");
                        setHabitsSha(null); // 清除 SHA 触发重新获取
                        return saveHabitsToGitHub(newHabits, config, false);
                    } else {
                        throw new Error('Habits Save API Error: ' + res.status);
                    }
                } catch (err) {
                    console.error("Habits Save Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const saveChecklistsToGitHub = async (newChecklists, config = githubConfig, retry = true) => {
                if (!config.token || !config.owner || !config.repo) return;
                setSyncStatus('syncing');
                try {
                    let currentSha = checklistsSha;
                    if (!currentSha) {
                        const checkRes = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/checklists.json`, {
                            headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json' }
                        });
                        if (checkRes.ok) {
                            const checkData = await checkRes.json();
                            currentSha = checkData.sha;
                        }
                    }

                    const content = btoa(unescape(encodeURIComponent(JSON.stringify(newChecklists, null, 2))));
                    const body = { message: "Sync checklists", content: content };
                    if (currentSha) body.sha = currentSha;

                    const res = await fetch(`https://api.github.com/repos/${config.owner}/${config.repo}/contents/checklists.json`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${config.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        const data = await res.json();
                        setChecklistsSha(data.content.sha);
                        setSyncStatus('success');
                        setTimeout(() => setSyncStatus(''), 3000);
                    } else if (res.status === 409 && retry) {
                        console.warn("Checklists sync conflict, retrying...");
                        setChecklistsSha(null);
                        return saveChecklistsToGitHub(newChecklists, config, false);
                    }
                } catch (err) {
                    console.error("Checklists Save Error:", err);
                    setSyncStatus('error');
                    setTimeout(() => setSyncStatus(''), 3000);
                }
            };

            const updateChecklist = (section, index, field, value) => {
                const currentDayList = checklists[date] || {
                    morning: [{t:'', d:false},{t:'', d:false},{t:'', d:false}],
                    afternoon: [{t:'', d:false},{t:'', d:false},{t:'', d:false}],
                    evening: [{t:'', d:false},{t:'', d:false},{t:'', d:false}]
                };
                
                const sectionList = [...currentDayList[section]];
                sectionList[index] = { ...sectionList[index], [field]: value };
                
                const newChecklists = {
                    ...checklists,
                    [date]: { ...currentDayList, [section]: sectionList }
                };
                setChecklists(newChecklists);
            };

            const commitChecklist = () => {
                saveChecklistsToGitHub(checklists);
            };
            const toggleHabit = (id) => {
                const newHabits = habits.map(h => {
                    if (h.id === id) {
                        const doneDates = h.doneDates.includes(date) 
                            ? h.doneDates.filter(d => d !== date)
                            : [...h.doneDates, date];
                        return { ...h, doneDates };
                    }
                    return h;
                });
                setHabits(newHabits);
                localStorage.setItem('habits_data', JSON.stringify(newHabits));
                saveHabitsToGitHub(newHabits);
            };

            const updateHabitName = (id, newName) => {
                const newHabits = habits.map(h => h.id === id ? { ...h, name: newName } : h);
                setHabits(newHabits);
                localStorage.setItem('habits_data', JSON.stringify(newHabits));
            };

            const commitHabitName = () => {
                saveHabitsToGitHub(habits);
                setEditingHabitId(null);
            };

            const calculateCatScore = (catId) => 6 + scores[catId].plus - scores[catId].minus;

            const updateScore = (catId, type, delta) => {
                setScores(prev => ({
                    ...prev,
                    [catId]: { ...prev[catId], [type]: Math.max(0, prev[catId][type] + delta) }
                }));
            };
            const handleSave = () => {
                const finalData = {
                    id: Date.now(),
                    date,
                    scores: {
                        heart: { score: calculateCatScore('heart'), ...scores.heart },
                        body: { score: calculateCatScore('body'), ...scores.body },
                        skill: { score: calculateCatScore('skill'), ...scores.skill }
                    },
                    total: calculateCatScore('heart') + calculateCatScore('body') + calculateCatScore('skill')
                };
                
                // 检查是否已存在该日期的记录，存在则更新，不存在则添加
                const existingIndex = logs.findIndex(l => l.date === date);
                let newLogs;
                if (existingIndex >= 0) {
                    newLogs = [...logs];
                    newLogs[existingIndex] = { ...finalData, id: logs[existingIndex].id }; // 保持原 ID
                } else {
                    newLogs = [finalData, ...logs];
                }

                setLogs(newLogs);
                localStorage.setItem('daily_logs', JSON.stringify(newLogs));
                saveToGitHub(newLogs);
                alert('今日记录已同步至云端！');
            };

            const deleteLog = (id) => {
                if (!confirm('确定要删除这条记录吗？')) return;
                const newLogs = logs.filter(l => l.id !== id);
                setLogs(newLogs);
                localStorage.setItem('daily_logs', JSON.stringify(newLogs));
                saveToGitHub(newLogs);
            };

            const exportToCSV = () => {
                if (logs.length === 0) return;
                const headers = ["日期", "总分", "心分数", "心备注", "体分数", "体备注", "技分数", "技备注"];
                const rows = logs.map(log => [
                    log.date,
                    log.total,
                    log.scores.heart.score,
                    `"${(log.scores.heart.note || '').replace(/"/g, '""')}"`,
                    log.scores.body.score,
                    `"${(log.scores.body.note || '').replace(/"/g, '""')}"`,
                    log.scores.skill.score,
                    `"${(log.scores.skill.note || '').replace(/"/g, '""')}"`
                ]);
                const csvContent = "\uFEFF" + [headers, ...rows].map(e => e.join(",")).join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `游戏三昧分析_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            return (
                <div className="min-h-screen pb-24 fade-in">
                    <nav className="bg-white border-b border-slate-200 px-6 py-4 sticky top-0 z-50 shadow-sm">
                        <div className="max-w-[1280px] mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 font-black text-xl tracking-tighter">
                                <div className="w-8 h-8 bg-slate-900 rounded-lg flex items-center justify-center text-white text-xs">游</div>
                                <span>游戏三昧：平静的心在体验每一天</span>
                            </div>
                            <div className="flex gap-2 bg-slate-100 p-1 rounded-xl">
                                <button
                                    onClick={() => setView('input')}
                                    className={`p-2 rounded-lg transition-all ${view === 'input' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}
                                >
                                    <Icon name="Calendar" size={20} />
                                </button>
                                <button
                                    onClick={() => setView('analysis')}
                                    className={`p-2 rounded-lg transition-all ${view === 'analysis' ? 'bg-white shadow-sm text-slate-900' : 'text-slate-400'}`}
                                >
                                    <Icon name="BarChart3" size={20} />
                                </button>
                                <button
                                    onClick={() => setShowSettings(true)}
                                    className={`relative p-2 rounded-lg transition-all text-slate-400 hover:text-slate-900`}
                                    title="设置与云同步"
                                >
                                    <Icon name="Settings" size={20} />
                                    {syncStatus === 'syncing' && <span className="absolute top-1 right-1 flex h-2 w-2"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span className="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span>}
                                    {syncStatus === 'success' && <span className="absolute top-1 right-1 w-2 h-2 rounded-full bg-emerald-500"></span>}
                                    {syncStatus === 'error' && <span className="absolute top-1 right-1 w-2 h-2 rounded-full bg-red-500"></span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* 设置弹窗 */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-md p-8 shadow-2xl relative animate-in zoom-in-95 duration-200">
                                <button onClick={() => setShowSettings(false)} className="absolute top-6 right-6 text-slate-400 hover:text-slate-900">
                                    <Icon name="X" size={24} />
                                </button>
                                <div className="flex items-center gap-3 mb-6">
                                    <Icon name="Github" size={28} className="text-slate-900" />
                                    <h2 className="text-xl font-black">云端同步设置</h2>
                                </div>
                                <p className="text-sm text-slate-500 mb-6">将数据同步至 GitHub 仓库的 <code className="bg-slate-100 px-1 py-0.5 rounded">data.json</code>，实现多端同步且永不丢失。</p>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">GitHub 用户名</label>
                                        <input 
                                            type="text" 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 ring-slate-900" 
                                            placeholder="例如: CloudDu86"
                                            value={githubConfig.owner}
                                            onChange={e => setGithubConfig({...githubConfig, owner: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">仓库名称</label>
                                        <input 
                                            type="text" 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 ring-slate-900" 
                                            placeholder="例如: memory_everyday"
                                            value={githubConfig.repo}
                                            onChange={e => setGithubConfig({...githubConfig, repo: e.target.value})}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">访问令牌 Personal Access Token <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" className="text-blue-500 hover:underline">去申请</a></label>
                                        <input 
                                            type="password" 
                                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 ring-slate-900" 
                                            placeholder="ghp_xxxxxxxxxxx"
                                            value={githubConfig.token}
                                            onChange={e => setGithubConfig({...githubConfig, token: e.target.value})}
                                        />
                                        <p className="text-[10px] text-slate-400 mt-1">需勾选 `repo` 权限。令牌仅保存在您当前浏览器的缓存中，非常安全。</p>
                                    </div>
                                    
                                    <div className="pt-4 flex gap-3">
                                        <button 
                                            onClick={() => {
                                                localStorage.setItem('github_config', JSON.stringify(githubConfig));
                                                alert('令牌配置已保存在本地。');
                                                if(githubConfig.token) fetchFromGitHub();
                                                setShowSettings(false);
                                            }}
                                            className="flex-1 bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-black transition-colors"
                                        >保存并同步</button>
                                        <button 
                                            onClick={() => {
                                                setGithubConfig({ token: '', owner: 'CloudDu86', repo: 'memory_everyday', fileSha: null });
                                                localStorage.removeItem('github_config');
                                            }}
                                            className="bg-red-50 text-red-600 font-bold px-4 py-3 rounded-xl hover:bg-red-100 transition-colors"
                                        >清除</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className="max-w-[1400px] mx-auto px-6 mt-10">
                        {view === 'input' ? (
                            <div className="space-y-8 animate-in slide-in-from-top-2 duration-500">
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                                    <div>
                                        <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">Step by step</p>
                                        <h1 className="text-4xl font-black">今日复盘</h1>
                                    </div>
                                    <div className="bg-white px-4 py-2 rounded-2xl border border-slate-200 shadow-sm flex items-center gap-2">
                                        <Icon name="Calendar" size={16} className="text-slate-400" />
                                        <input
                                            type="date"
                                            value={date}
                                            onChange={e => setDate(e.target.value)}
                                            className="outline-none font-bold text-slate-700 bg-transparent"
                                        />
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-8">
                                    {CATEGORIES.map(cat => (
                                        <div key={cat.id} className={`p-8 rounded-[2.5rem] border ${cat.borderColor} ${cat.color} transition-all lg:col-span-1 hover:shadow-xl group`}>
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="p-3 bg-white rounded-2xl shadow-sm group-hover:scale-110 transition-transform">
                                                    <Icon name={cat.iconName} className={cat.iconColor} size={24} />
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase">当前得分</p>
                                                    <span className="text-4xl font-black text-slate-800">{calculateCatScore(cat.id)}</span>
                                                </div>
                                            </div>

                                            <h3 className="font-bold text-xl mb-1 text-slate-800">{cat.name}</h3>
                                            <p className="text-xs text-slate-500 mb-6">{cat.sub}</p>

                                            <div className="flex gap-3 mb-6">
                                                <div className="flex-1 bg-white/70 p-3 rounded-2xl flex justify-between items-center ring-1 ring-inset ring-black/5">
                                                    <button className="hover:text-red-500 transition-colors" onClick={() => updateScore(cat.id, 'plus', -1)}><Icon name="Minus" size={16} /></button>
                                                    <span className="font-black text-lg">{scores[cat.id].plus}</span>
                                                    <button className="hover:text-emerald-500 transition-colors" onClick={() => updateScore(cat.id, 'plus', 1)}><Icon name="Plus" size={16} /></button>
                                                </div>
                                                <div className="flex-1 bg-white/70 p-3 rounded-2xl flex justify-between items-center text-red-500 ring-1 ring-inset ring-red-500/10">
                                                    <button className="hover:text-slate-400 transition-colors" onClick={() => updateScore(cat.id, 'minus', -1)}><Icon name="Minus" size={16} /></button>
                                                    <span className="font-black text-lg">{scores[cat.id].minus}</span>
                                                    <button className="hover:text-red-700 transition-colors" onClick={() => updateScore(cat.id, 'minus', 1)}><Icon name="Plus" size={16} /></button>
                                                </div>
                                            </div>

                                            <textarea
                                                className="w-full p-4 text-sm rounded-2xl h-24 bg-white/50 border-none outline-none focus:bg-white focus:ring-2 ring-slate-200 transition-all resize-none"
                                                placeholder="发生了什么？..."
                                                value={scores[cat.id].note}
                                                onChange={e => setScores({ ...scores, [cat.id]: { ...scores[cat.id], note: e.target.value } })}
                                            />
                                        </div>
                                    ))}

                                    {/* 习惯养成卡片（平行放置） */}
                                    {habits.map(habit => (
                                        <div key={habit.id} className="p-8 rounded-[2.5rem] border border-indigo-100 bg-indigo-50 transition-all lg:col-span-1 hover:shadow-xl group">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="p-3 bg-white rounded-2xl shadow-sm group-hover:scale-110 transition-transform text-indigo-500">
                                                    <Icon name="Target" size={24} />
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">已坚持</p>
                                                    <span className="text-4xl font-black text-slate-800">{habit.doneDates.length} <span className="text-sm">天</span></span>
                                                </div>
                                            </div>

                                            <div className="flex items-center gap-2 mb-1 group/title">
                                                {editingHabitId === habit.id ? (
                                                    <input 
                                                        autoFocus
                                                        className="bg-white/50 border-none rounded px-2 py-0.5 font-bold text-xl text-slate-800 outline-none ring-2 ring-indigo-200 w-full"
                                                        value={habit.name}
                                                        onChange={e => updateHabitName(habit.id, e.target.value)}
                                                        onBlur={commitHabitName}
                                                        onKeyDown={e => e.key === 'Enter' && commitHabitName()}
                                                    />
                                                ) : (
                                                    <h3 className="font-bold text-xl text-slate-800 flex items-center gap-2">
                                                        {habit.name}
                                                        <button 
                                                            onClick={() => setEditingHabitId(habit.id)}
                                                            className="opacity-0 group-hover/title:opacity-100 transition-opacity text-slate-400 hover:text-indigo-500"
                                                        >
                                                            <Icon name="Pencil" size={14} />
                                                        </button>
                                                    </h3>
                                                )}
                                            </div>
                                            <p className="text-xs text-slate-500 mb-6 tracking-tight">养成一个长期稳定的好习惯</p>

                                            <button 
                                                onClick={() => toggleHabit(habit.id)}
                                                className={`w-full py-4 rounded-2xl font-black text-lg transition-all shadow-sm active:scale-95 ${habit.doneDates.includes(date) ? 'bg-indigo-500 text-white shadow-indigo-200' : 'bg-white text-slate-600 border border-slate-200 hover:border-indigo-300'}`}
                                            >
                                                {habit.doneDates.includes(date) ? '今日已打卡' : '今日打卡'}
                                            </button>
                                            
                                            <div className="mt-4 pt-4 border-t border-indigo-100/50">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">21 天打卡挑战</p>
                                                <div className="grid grid-cols-7 gap-1.5">
                                                    {[...Array(21)].map((_, i) => {
                                                        const d = new Date();
                                                        d.setDate(d.getDate() - (20 - i));
                                                        const dateStr = d.toISOString().split('T')[0];
                                                        const isDone = habit.doneDates.includes(dateStr);
                                                        return (
                                                            <div key={i} className={`aspect-square rounded-sm ${isDone ? 'bg-indigo-500 shadow-sm shadow-indigo-200' : 'bg-white border border-slate-100'}`} title={dateStr}></div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {/* 复选清单卡片 (Check List) */}
                                    <div className="p-8 rounded-[2.5rem] border border-amber-200 bg-amber-100/80 transition-all lg:col-span-1 hover:shadow-xl">
                                        <div className="flex justify-between items-start mb-6">
                                            <div className="p-3 bg-white rounded-2xl shadow-sm text-amber-600">
                                                <Icon name="ListTodo" size={20} />
                                            </div>
                                            <div className="text-right">
                                                <h3 className="font-bold text-lg text-slate-800 leading-tight">今日清单</h3>
                                                <p className="text-[9px] font-bold text-amber-700/50 uppercase tracking-widest">Checklist</p>
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            {['morning', 'afternoon', 'evening'].map((section) => (
                                                <div key={section} className="space-y-2">
                                                    <p className="text-[10px] font-black text-amber-800/40 uppercase tracking-widest px-1">
                                                        {section === 'morning' ? '上午' : section === 'afternoon' ? '下午' : '晚上'}
                                                    </p>
                                                    <div className="space-y-1.5 px-0.5">
                                                        {(checklists[date]?.[section] || [{t:'',d:false},{t:'',d:false},{t:'',d:false}]).map((item, idx) => (
                                                            <div key={idx} className="flex items-center gap-2 group/item">
                                                                <button 
                                                                    onClick={() => {
                                                                        updateChecklist(section, idx, 'd', !item.d);
                                                                        setTimeout(commitChecklist, 100);
                                                                    }}
                                                                    className={`w-4 h-4 rounded-md flex items-center justify-center transition-colors flex-shrink-0 ${item.d ? 'bg-amber-600 text-white' : 'bg-white/50 border border-amber-200 group-hover/item:border-amber-400'}`}
                                                                >
                                                                    {item.d && <Icon name="Check" size={10} />}
                                                                </button>
                                                                <input 
                                                                    className={`bg-transparent border-none placeholder:text-amber-300 text-xs focus:outline-none w-full ${item.d ? 'line-through text-amber-700/40' : 'text-amber-900 font-medium'}`}
                                                                    placeholder="..."
                                                                    value={item.t}
                                                                    onChange={e => updateChecklist(section, idx, 't', e.target.value)}
                                                                    onBlur={commitChecklist}
                                                                />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                <button
                                    onClick={handleSave}
                                    className="w-full py-5 bg-slate-900 text-white rounded-[2rem] font-black text-lg shadow-2xl shadow-slate-200 hover:bg-black hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2"
                                >
                                    <Icon name="Save" size={20} />
                                    保存今日心法
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in slide-in-from-bottom-2 duration-500">
                                <div className="flex justify-between items-center">
                                    <h1 className="text-3xl font-black">成长轨迹</h1>
                                    <button
                                        onClick={exportToCSV}
                                        className="text-sm font-bold flex items-center gap-2 border bg-white border-slate-200 px-5 py-3 rounded-2xl hover:bg-slate-50 transition-all shadow-sm"
                                    >
                                        <Icon name="Download" size={18} /> 导出 Excel (.csv)
                                    </button>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b">
                                                <tr>
                                                    <th className="p-6">日期</th>
                                                    <th className="p-6">总得分</th>
                                                    <th className="p-6">维度明细 (心 / 体 / 技)</th>
                                                    <th className="p-6">操作</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {logs.map(log => (
                                                    <tr key={log.id} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-6 font-bold text-slate-700">{log.date}</td>
                                                        <td className="p-6">
                                                            <span className="bg-slate-900 text-white px-3 py-1 rounded-lg text-xs font-black">
                                                                {log.total}
                                                            </span>
                                                        </td>
                                                        <td className="p-6">
                                                            <div className="flex gap-4 text-xs font-bold">
                                                                <span className="text-red-500">心: {log.scores.heart.score}</span>
                                                                <span className="text-emerald-500">体: {log.scores.body.score}</span>
                                                                <span className="text-blue-500">技: {log.scores.skill.score}</span>
                                                            </div>
                                                        </td>
                                                        <td className="p-6 text-right">
                                                            <button
                                                                onClick={() => deleteLog(log.id)}
                                                                className="text-slate-300 hover:text-red-500 transition-colors p-2"
                                                            >
                                                                <Icon name="Trash2" size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {logs.length === 0 && (
                                        <div className="py-20 text-center text-slate-400 italic">
                                            暂无记录。今天就开始你的修行吧。
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
